# Unit rules. Numeric stats are [approximate] (Ultima Codex monster_data, via research agents);
# trainer/unlock levels are [verified]. Defense is per attacker-type: {infantry,cavalry,magic,artillery}.
# upkeepGrain = grain/day. carry = plunder capacity. trainingTimeSec = Basis-Trainingszeit/Einheit [A]
# (Quellen geben keine exakten Zeiten; kurze Dev-Werte, später kalibrierbar). See GAME-MECHANICS.md §4–5.
schemaVersion: 1

units:
  city_guard:
    name: 'City Guard'
    type: special
    role: defensive
    attack: 10
    defense: { infantry: 10, cavalry: 10, magic: 10, artillery: 10 }
    upkeepGrain: 2
    carry: 0
    trainer: { building: watch_house, level: 1 }
    cost: { timber: 100, stone: 0, iron: 0, gold: 0 }
    trainingTimeSec: 30
