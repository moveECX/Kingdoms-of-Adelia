# Combat constants — see GAME-MECHANICS.md §5 ([verified] formula).
combat:
  intensity: { assault: 0.5, scout: 0.5, boss: 0.5, plunderDefender: 0.01, raid: 0.5, default: 0.1 }
  defenseColumns: [infantry, cavalry, magic, artillery]
  wallBonusPct: [1, 3, 6, 10, 15, 20, 26, 33, 41, 50]
  nightProtection: { fromHour: 22, toHour: 10, attackerPenaltyPct: 40 }
