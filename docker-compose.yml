# Lokale Entwicklungs-Datenbank. `docker compose up -d db` → sauberes PostgreSQL in Sekunden.
# Produktion ebenfalls PostgreSQL (kein SQLite — siehe ARCHITECTURE.md).
services:
  db:
    image: postgres:16-alpine
    container_name: adelia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adelia}
      POSTGRES_DB: ${POSTGRES_DB:-adelia}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - adelia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-adelia}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  adelia-pgdata:
